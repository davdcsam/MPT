# Emotional tone catalog for Chatterbox-local narration.
#
# Ported from the ThinkBeforeYouSpeak project's catalogo_tonos.yaml: the style
# guide an LLM uses to tag script segments with an emotional tone, and the
# per-tone Chatterbox generation params (voice-cloning reference wav +
# exaggeration/cfg_weight/temperature) that give each tone its character.
# Only 2 reference wavs are bundled (normal-explaining.wav, impressive-happy.wav)
# but 6 tones map onto them with different generation params, so the same 2
# voice samples still produce audibly distinct deliveries per tone.
#
# base_params meaning (passed to ChatterboxTTS.generate()):
#   exaggeration (0.0-1.0): emotional intensity. Higher = more intense.
#   cfg_weight (0.0-1.0): fidelity to the cloned reference voice. Higher = more rigid.
#   temperature (0.0-1.0+): sampling variability. Higher = more expressive.
#   top_p, repetition_penalty: fine sampling knobs; library defaults are fine
#     for most cases, so they're omitted per-tone here and fall back to the
#     engine.py library defaults.

extensible: false # closed catalog: the LLM may only use these exact tone names
default_tone: EXPLICACION # used when use_llm_planning=false or planning fails

tones:
  GANCHO:
    intent: "Grab initial attention, provoke, generate immediate curiosity."
    reference_wav: impressive-happy.wav
    base_params: {exaggeration: 0.7, cfg_weight: 0.4, temperature: 0.9}

  INTRODUCCION:
    intent: "Introduce the topic, orient the listener before going into detail."
    reference_wav: normal-explaining.wav
    base_params: {exaggeration: 0.4, cfg_weight: 0.5, temperature: 0.75}

  EXPLICACION:
    intent: "Convey neutral, clear information."
    reference_wav: normal-explaining.wav
    base_params: {exaggeration: 0.3, cfg_weight: 0.6, temperature: 0.7}

  EXPLICACION_ENERGICA:
    intent: "Explain a technical point while holding attention, more dynamic than EXPLICACION."
    reference_wav: normal-explaining.wav
    base_params: {exaggeration: 0.5, cfg_weight: 0.5, temperature: 0.8}

  AFIRMATIVO:
    intent: "Reinforce an idea with confidence, logical and forceful argument."
    reference_wav: normal-explaining.wav
    base_params: {exaggeration: 0.45, cfg_weight: 0.6, temperature: 0.7}

  TRIUNFO:
    intent: "Success, positive close, impact or pleasant surprise."
    reference_wav: impressive-happy.wav
    base_params: {exaggeration: 0.7, cfg_weight: 0.4, temperature: 0.85}
